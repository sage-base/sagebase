name: dbt Run - Vault & Main Layer更新

on:
  # export-to-bq完了後に手動トリガー、または定期実行
  workflow_dispatch:
    inputs:
      target:
        description: "dbtターゲット（ci / prod）"
        required: false
        default: "ci"
        type: choice
        options:
          - ci
          - prod
      full_refresh:
        description: "フルリフレッシュ実行"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  DBT_PROFILES_DIR: .

jobs:
  dbt-run:
    name: dbt deps → run → test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # dbt Fusion 2.0はpreview段階でBQ Storage Read APIを必須使用し、
      # ADBC経由のためREST APIへのフォールバック設定が存在しない（dbt-fusion#236）。
      # roles/bigquery.readSessionUser付与済みでもCI環境で"Storage API is not available
      # for query"エラーが解消しないため、安定版のdbt-core 1.x系を使用する。
      # ローカル開発ではdbt Fusion 2.0を使用可能。
      - name: Install dbt-bigquery
        run: |
          pip install dbt-bigquery~=1.11.0

      - name: Verify dbt version
        run: |
          dbt --version

      # GCP認証（Service Account Key）
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Install dbt packages
        working-directory: dbt
        run: |
          dbt deps --target ${{ inputs.target || 'ci' }}

      - name: dbt run
        working-directory: dbt
        run: |
          dbt run \
            --target ${{ inputs.target || 'ci' }} \
            ${{ inputs.full_refresh == true && '--full-refresh' || '' }}

      - name: dbt test
        working-directory: dbt
        run: |
          dbt test --target ${{ inputs.target || 'ci' }}
